name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

jobs:
  test-unix:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make pkg-config libexiv2-dev libzstd-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install exiv2 zstd

      - name: Build + test
        run: make test

  test-windows-msys2:
    name: test (windows-msys2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            pkgconf
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-zstd

      - name: Build + test
        run: make test CC=clang CXX=clang++

  coverage-ubuntu:
    name: coverage (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make pkg-config libexiv2-dev libzstd-dev python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install gcovr

      - name: Build + test + coverage
        run: ./scripts/coverage_ci.sh

      - name: Coverage ratchet gate
        run: python3 ./scripts/coverage_gate.py --baseline tests/coverage/baseline.json --summary build/coverage/summary.json

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu
          path: |
            build/coverage/coverage.txt
            build/coverage/coverage.json
            build/coverage/coverage.xml
            build/coverage/summary.json

  gui-build-macos:
    name: gui-build (macos)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew install exiv2 zstd raylib

      - name: Build GUI
        run: make gui
